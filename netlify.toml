[build]
  command   = "npm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION = "22"

# ── 404 ──────────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ── Security headers (all routes) ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — stricter than SAMEORIGIN
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=(), payment=()"

    # HSTS — enforce HTTPS for 1 year (only safe on HTTPS domains like Netlify)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

    # Content Security Policy
    # - Removed 'unsafe-eval' (not needed by Next.js 15 static export)
    # - Added frame-ancestors 'none' (more effective than X-Frame-Options in modern browsers)
    # - Added base-uri and form-action for defense-in-depth
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self' https://api.emailjs.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# ── Cache — Next.js static assets (hashed filenames = immutable) ─────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache — HTML pages (always revalidate) ────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache — public assets (1 day + SWR 7 days) ───────────────────────────────
[[headers]]
  for = "/projects/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
